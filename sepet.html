<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sepetim — Online VIP Dershane</title>
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/cart.css">
<style>
:root{--navy:#1a3fad;--accent:#e8232a;--accent2:#c8191f;--text:#1a1f36;--muted:#6e6e73;--border:#e5e5e7;--light:#f5f5f7;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#fff;color:var(--text);line-height:1.6;}
a{text-decoration:none;color:inherit;}
.nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.98);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
.nav-in{max-width:1100px;margin:0 auto;padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:68px;gap:16px;}
.nav-logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;color:var(--navy);}
.nav-right{display:flex;align-items:center;gap:8px;}
.btn-link{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border);}
.btn-cta{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;background:var(--accent);color:#fff;border:none;}
.container{max-width:900px;margin:0 auto;padding:40px 5% 80px;}
h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,36px);margin-bottom:8px;}
.lead{color:var(--muted);margin-bottom:28px;}
.cart-empty{text-align:center;padding:48px 24px;background:var(--light);border-radius:16px;border:1px dashed var(--border);}
.cart-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.cart-item{display:flex;gap:16px;align-items:center;padding:18px;border:1px solid var(--border);border-radius:14px;background:#fff;flex-wrap:wrap;}
.cart-item-info{flex:1;min-width:180px;}
.cart-item-name{font-weight:700;font-size:15px;margin-bottom:4px;}
.cart-item-sub{font-size:12.5px;color:var(--muted);}
.cart-item-price{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:800;color:var(--navy);white-space:nowrap;}
.qty-wrap{display:flex;align-items:center;gap:8px;}
.qty-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:18px;cursor:pointer;}
.qty-val{min-width:24px;text-align:center;font-weight:700;}
.btn-remove{background:none;border:none;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;padding:4px 0;}
.summary{background:var(--light);border:1px solid var(--border);border-radius:16px;padding:24px;}
.summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:15px;}
.summary-total{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;color:var(--navy);}
.btn-checkout{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:8px;}
.btn-checkout:hover{background:var(--accent2);}
.btn-checkout:disabled{opacity:.6;cursor:not-allowed;}
.note{font-size:12px;color:var(--muted);margin-top:12px;text-align:center;}
@media(max-width:600px){.cart-item{align-items:flex-start;}.cart-item-price{width:100%;}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-in">
    <a href="index.html" class="nav-logo">Online VIP Dershane</a>
    <div class="nav-right">
      <a href="programlar/index.html" class="btn-link">Programlar</a>
      <a href="index.html" class="btn-link">Ana Sayfa</a>
    </div>
  </div>
</nav>
<main class="container">
  <h1>🛒 Sepetim</h1>
  <p class="lead">Seçtiğiniz programları gözden geçirin ve güvenli ödeme ile satın alın.</p>
  <div id="cart-root"></div>
</main>
<script src="assets/products.js"></script>
<script src="assets/cart.js"></script>
<script>
(function(){
  function render(){
    var root=document.getElementById('cart-root');
    var items=OVD_CART.read();
    if(!items.length){
      root.innerHTML='<div class="cart-empty"><p style="margin-bottom:16px;font-size:16px;">Sepetiniz şu an boş.</p><a href="programlar/index.html" class="btn-cta" style="display:inline-block;">Programları İncele</a></div>';
      return;
    }
    var html='<div class="cart-list">';
    items.forEach(function(item){
      var p=VIP_getProduct(item.id);
      if(!p)return;
      var line=p.price*(item.qty||1);
      html+='<div class="cart-item" data-id="'+p.id+'">';
      html+='<div class="cart-item-info"><div class="cart-item-name">'+p.name+'</div><div class="cart-item-sub">'+p.subtitle+'</div><button type="button" class="btn-remove" data-remove="'+p.id+'">Kaldır</button></div>';
      html+='<div class="qty-wrap"><button type="button" class="qty-btn" data-qty="'+p.id+'" data-delta="-1">−</button><span class="qty-val">'+item.qty+'</span><button type="button" class="qty-btn" data-qty="'+p.id+'" data-delta="1">+</button></div>';
      html+='<div class="cart-item-price">'+VIP_formatPrice(line)+'</div></div>';
    });
    html+='</div><div class="summary"><div class="summary-row"><span>Ara Toplam</span><strong id="cart-subtotal">'+VIP_formatPrice(OVD_CART.total())+'</strong></div>';
    html+='<div class="summary-row" style="margin-bottom:0;"><span>Toplam</span><span class="summary-total" id="cart-total">'+VIP_formatPrice(OVD_CART.total())+'</span></div>';
    html+='<a href="odeme.html" class="btn-checkout" style="text-decoration:none;">💳 Ödemeye Geç</a>';
    html+='<p class="note">Ödeme Stripe güvenli ödeme altyapısı ile kredi/banka kartı üzerinden alınır.</p></div>';
    root.innerHTML=html;
  }
  document.addEventListener('DOMContentLoaded',function(){
    render();
    document.getElementById('cart-root').addEventListener('click',function(e){
      var t=e.target;
      if(t.dataset.remove){OVD_CART.remove(t.dataset.remove);render();return;}
      if(t.dataset.qty){
        var id=t.dataset.qty,delta=parseInt(t.dataset.delta,10);
        var cur=OVD_CART.read().find(function(x){return x.id===id;});
        if(cur) OVD_CART.setQty(id,Math.max(1,Math.min(5,(cur.qty||1)+delta)));
        render();
      }
    });
    window.addEventListener('ovd-cart-updated',render);
  });
})();
</script>
</body>
</html>
