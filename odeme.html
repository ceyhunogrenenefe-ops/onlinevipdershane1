<style>
:root{--navy:#1a3fad;--accent:#e8232a;--accent2:#c8191f;--text:#1a1f36;--muted:#6e6e73;--border:#e5e5e7;--light:#f5f5f7;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#fff;color:var(--text);line-height:1.6;}
a{text-decoration:none;color:inherit;}
.nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.98);border-bottom:1px solid var(--border);}
.nav-in{max-width:1100px;margin:0 auto;padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:68px;}
.nav-logo{display:inline-flex;align-items:center;flex-shrink:0;line-height:0;}
.container{max-width:960px;margin:0 auto;padding:40px 5% 80px;}
h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,36px);margin-bottom:8px;}
.lead{color:var(--muted);margin-bottom:28px;}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:start;}
@media(max-width:800px){.grid{grid-template-columns:1fr;}}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px;}
.card h2{font-size:18px;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;}
.field input,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font:inherit;font-size:14px;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,63,173,.12);}
.field small{display:block;margin-top:4px;color:var(--muted);font-size:12px;}
.order-line{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;}
.order-line:last-child{border-bottom:none;}
.order-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:2px solid var(--border);}
.order-total strong{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;color:var(--navy);}
.btn-pay{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:16px;}
.btn-pay:hover{background:var(--accent2);}
.btn-pay:disabled{opacity:.65;cursor:not-allowed;}
.secure{font-size:12px;color:var(--muted);margin-top:12px;text-align:center;}
.error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none;}
.back-link{display:inline-block;margin-bottom:20px;color:var(--navy);font-weight:700;font-size:14px;}
</style>

<main class="container">
  <a href="sepet.html" class="back-link">← Sepete Dön</a>
  <h1>💳 Ödeme</h1>
  <p class="lead" id="pay-lead">Veli bilgilerinizi girin; güvenli ödeme ekranına yönlendirileceksiniz.</p>
  <div class="grid" id="checkout-grid">
    <form class="card" id="checkout-form">
      <h2>Veli Bilgileri</h2>
      <div class="error" id="form-error"></div>
      <div class="field">
        <label for="parentName">Veli Adı Soyadı *</label>
        <input id="parentName" name="parentName" required autocomplete="name" placeholder="Örn. Ayşe Yılmaz">
      </div>
      <div class="field">
        <label for="phone">Telefon *</label>
        <input id="phone" name="phone" required type="tel" autocomplete="tel" placeholder="05xx xxx xx xx">
      </div>
      <div class="field">
        <label for="email">E-posta *</label>
        <input id="email" name="email" required type="email" autocomplete="email" placeholder="ornek@email.com">
        <small>Ödeme makbuzu bu adrese gönderilir.</small>
      </div>
      <div class="field">
        <label for="studentInfo">Öğrenci Bilgisi (isteğe bağlı)</label>
        <textarea id="studentInfo" name="studentInfo" rows="3" placeholder="Öğrenci adı, sınıf seviyesi vb."></textarea>
      </div>
      <button type="submit" class="btn-pay" id="pay-btn">🔒 Kredi Kartı ile Öde</button>
      <p class="secure" id="pay-secure">256-bit SSL · Güvenli ödeme · Visa, Mastercard, Troy</p>
    </form>
    <aside class="card">
      <h2>Sipariş Özeti</h2>
      <div id="order-summary"></div>
    </aside>
  </div>
</main>
<script src="assets/products.js?v=20260716b"></script>
<script src="assets/cart.js?v=20260716b"></script>
<script>
(function(){
  var provider='none';
  var selectedTeacherSlug='';

  function ensurePackageFromQuery(){
    var paket=new URLSearchParams(location.search).get('paket')||'';
    var teacher=new URLSearchParams(location.search).get('ogretmen')||'';
    if(!teacher){
      try{ teacher=sessionStorage.getItem('ovd_premium_teacher')||''; }catch(e){}
    }
    if(teacher && /^[a-z0-9]+(?:-[a-z0-9]+)*$/i.test(teacher)){
      selectedTeacherSlug=teacher.toLowerCase();
    }
    if(paket && VIP_getProduct(paket)){
      var items=OVD_CART.read();
      var has=items.some(function(it){ return it.id===paket; });
      if(!has || items.length!==1){
        OVD_CART.write([{ id:paket, qty:1 }]);
      }
    }
    if(selectedTeacherSlug){
      var tip=document.getElementById('studentInfo');
      if(tip && !tip.value){
        tip.value='Premium özel ders · Öğretmen: '+selectedTeacherSlug.replace(/-/g,' ');
      }
    }
    var isPremium=!!(paket && String(paket).indexOf('ders-')===0);
    if(isPremium){
      document.querySelectorAll('.back-link').forEach(function(a){
        a.href='premium-paketler.html';
        a.textContent='← Paketlere Dön';
      });
    }
  }

  function renderSummary(){
    var box=document.getElementById('order-summary');
    var items=OVD_CART.read();
    if(!items.length){
      location.href='sepet.html';
      return;
    }
    var html='';
    items.forEach(function(item){
      var p=VIP_getProduct(item.id);
      if(!p)return;
      html+='<div class="order-line"><span>'+p.name+' × '+item.qty+'</span><strong>'+VIP_formatPrice(p.price*item.qty)+'</strong></div>';
    });
    html+='<div class="order-total"><span>Toplam</span><strong>'+VIP_formatPrice(OVD_CART.total())+'</strong></div>';
    box.innerHTML=html;
  }

  function showError(msg){
    var el=document.getElementById('form-error');
    el.textContent=msg;
    el.style.display='block';
  }

  function customerPayload(){
    return {
      parentName:document.getElementById('parentName').value.trim(),
      phone:document.getElementById('phone').value.trim(),
      email:document.getElementById('email').value.trim(),
      studentInfo:document.getElementById('studentInfo').value.trim(),
      teacherSlug:selectedTeacherSlug||''
    };
  }

  async function startPaytr(btn){
    var res=await fetch('/api/paytr-token',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({items:OVD_CART.read(),customer:customerPayload()})
    });
    var data=await res.json();
    if(!res.ok) throw new Error(data.error||'PayTR ödeme başlatılamadı');
    btn.textContent='PayTR sayfasına yönlendiriliyorsunuz…';
    window.location.assign('https://www.paytr.com/odeme/guvenli/'+encodeURIComponent(data.token));
  }

  async function startStripe(btn){
    var res=await fetch('/api/create-checkout-session',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({items:OVD_CART.read(),customer:customerPayload()})
    });
    var data=await res.json();
    if(!res.ok) throw new Error(data.error||'Ödeme başlatılamadı');
    if(data.url) window.location.href=data.url;
    else throw new Error('Ödeme bağlantısı alınamadı');
  }

  document.addEventListener('DOMContentLoaded',async function(){
    ensurePackageFromQuery();
    renderSummary();
    try{
      var cfg=await fetch('/api/payment-provider').then(function(r){return r.json();});
      provider=cfg.provider||'none';
      if(provider==='paytr'){
        document.getElementById('pay-lead').textContent='Veli bilgilerinizi girin; PayTR güvenli ödeme sayfasına yönlendirileceksiniz.';
        document.getElementById('pay-secure').textContent='PayTR güvenli ödeme · Visa, Mastercard, Troy';
      }else if(provider==='stripe'){
        document.getElementById('pay-lead').textContent='Veli bilgilerinizi girin; Stripe güvenli ödeme sayfasına yönlendirileceksiniz.';
      }else if(cfg.paytr && cfg.paytr.missingEnv && cfg.paytr.missingEnv.length){
        showError('Ödeme sistemi henüz tam yapılandırılmamış. PayTR mağaza bilgileri Vercel ortam değişkenlerine girilmeli. (Eksik: '+cfg.paytr.missingEnv.join(', ')+')');
      }
    }catch(e){}

    document.getElementById('checkout-form').addEventListener('submit',async function(e){
      e.preventDefault();
      var btn=document.getElementById('pay-btn');
      var err=document.getElementById('form-error');
      err.style.display='none';
      btn.disabled=true;
      btn.textContent='Yönlendiriliyor...';
      try{
        if(provider==='paytr') await startPaytr(btn);
        else if(provider==='stripe') await startStripe(btn);
        else throw new Error('Ödeme sistemi yapılandırılmamış. Lütfen bizimle iletişime geçin.');
      }catch(ex){
        showError(ex.message||'Bir hata oluştu. Lütfen tekrar deneyin.');
        btn.disabled=false;
        btn.textContent='🔒 Kredi Kartı ile Öde';
      }
    });
  });
})();
</script>
